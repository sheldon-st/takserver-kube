apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tak-server.fullname" . }}-postgres-config
  labels:
    {{- include "tak-server.labels" . | nindent 4 }}
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 500
    shared_buffers = 256MB
    dynamic_shared_memory_type = posix
    log_destination = 'stderr'
    logging_collector = on
    log_directory = 'log'
    log_filename = 'postgresql-%a.log'
    log_truncate_on_rotation = on
    log_rotation_age = 1d
    log_rotation_size = 0
    log_line_prefix = '%m [%p] '
    log_timezone = 'UTC'
    datestyle = 'iso, mdy'
    timezone = 'UTC'
    lc_messages = 'en_US.UTF-8'
    lc_monetary = 'en_US.UTF-8'
    lc_numeric = 'en_US.UTF-8'
    lc_time = 'en_US.UTF-8'
    default_text_search_config = 'pg_catalog.english'

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tak-server.fullname" . }}-tak
  labels:
    {{- include "tak-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: takserver
spec:
  replicas: {{ .Values.takserver.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: takserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: takserver
    spec:
      containers:
        - name: takserver
          image: "{{ .Values.takserver.image }}:{{ .Values.takserver.tag }}"
          imagePullPolicy: {{ .Values.takserver.pullPolicy }}
          env:
            - name: COUNTRY
              value: {{ .Values.certs.country | quote }}
            - name: STATE
              value: {{ .Values.certs.state | quote }}
            - name: CITY
              value: {{ .Values.certs.city | quote }}
            - name: ORGANIZATIONAL_UNIT
              value: {{ .Values.certs.orgUnit | quote }}
          ports:
            - containerPort: {{ .Values.service.ports.ssl }}
              name: ssl
            - containerPort: {{ .Values.service.ports.https }}
              name: https
            - containerPort: {{ .Values.service.ports.fedHttps }}
              name: fed-https
            - containerPort: {{ .Values.service.ports.certHttps }}
              name: cert-https
            - containerPort: {{ .Values.service.ports.webSocketSecure }}
              name: ws-secure
            - containerPort: {{ .Values.service.ports.webSocket }}
              name: ws
          volumeMounts:
            - name: tak-data
              mountPath: /opt/tak
          resources:
            {{- toYaml .Values.takserver.resources | nindent 12 }}
      volumes:
        - name: tak-data
          persistentVolumeClaim:
            claimName: {{ include "tak-server.fullname" . }}-tak-data

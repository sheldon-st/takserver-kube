apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tak-server.fullname" . }}-db
  labels:
    {{- include "tak-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  replicas: {{ .Values.database.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: tak-database
          image: "{{ .Values.database.image }}:{{ .Values.database.tag }}"
          imagePullPolicy: {{ .Values.database.pullPolicy }}
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
            - name: tak-data
              mountPath: /opt/tak
          resources:
            {{- toYaml .Values.database.resources | nindent 12 }}
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: {{ include "tak-server.fullname" . }}-db-data
        - name: tak-data
          persistentVolumeClaim:
            claimName: {{ include "tak-server.fullname" . }}-tak-data
